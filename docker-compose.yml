      - ./keys:/app/keys
      - ./ledgers:/app/ledgers

  node4:
    build: .
    container_name: node4
    command: python src/node.py 4
    ports:
      - "6004:6004"
    volumes:
      - ./keys:/app/keys
      - ./ledgers:/app/ledgers

