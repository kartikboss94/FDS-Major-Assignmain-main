services:

  node1:
    build: .
    container_name: node1
    command: python src/node.py 1
    ports:
      - "6001:6001"
    volumes:
      - ./keys:/app/keys
      - ./ledgers:/app/ledgers

  node2:
    build: .
    container_name: node2
    command: python src/node.py 2
    ports:
      - "6002:6002"
    volumes:
      - ./keys:/app/keys
      - ./ledgers:/app/ledgers

  node3:
    build: .
    container_name: node3
    command: python src/node.py 3
    ports:
